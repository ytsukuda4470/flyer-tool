<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>フライヤー作成ツール</title>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;background:#f0f4f8;min-height:100vh;}
    header{background:#2a9d8f;color:#fff;padding:14px 22px;box-shadow:0 2px 8px rgba(0,0,0,.15);}
    header h1{font-size:17px;font-weight:bold;}
    header p{font-size:11px;opacity:.85;margin-top:2px;}

    /* ===== デザイン選択 ===== */
    .design-bar{background:#fff;border-bottom:2px solid #e0f5f3;padding:14px 20px;}
    .design-bar h2{font-size:13px;color:#2a9d8f;font-weight:bold;margin-bottom:10px;}
    .design-cards{display:flex;gap:10px;flex-wrap:wrap;}
    .design-card{cursor:pointer;border:3px solid #ddd;border-radius:8px;overflow:hidden;width:90px;transition:all .2s;background:#f8f8f8;}
    .design-card:hover{border-color:#2a9d8f;}
    .design-card.active{border-color:#2a9d8f;box-shadow:0 0 0 2px #2a9d8f40;}
    .design-card img{width:100%;height:120px;object-fit:cover;display:block;}
    .design-card .dc-name{font-size:10px;text-align:center;padding:4px 2px;color:#555;font-weight:bold;}
    .design-card.active .dc-name{color:#2a9d8f;}
    .cors-warning{font-size:11px;color:#e07b00;background:#fff8e1;border:1px solid #ffd54f;border-radius:6px;padding:8px 12px;margin-top:8px;display:none;}

    /* ===== メインレイアウト ===== */
    .wrap{display:flex;gap:18px;padding:18px;max-width:1200px;margin:0 auto;align-items:flex-start;}
    .left{width:300px;flex-shrink:0;display:flex;flex-direction:column;gap:12px;}
    .card{background:#fff;border-radius:10px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.07);}
    .card-title{font-size:13px;font-weight:bold;color:#2a9d8f;margin-bottom:12px;padding-bottom:7px;border-bottom:2px solid #e0f5f3;}

    .field-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
    .field-row{display:flex;align-items:center;gap:6px;background:#f8fffe;border:1.5px solid #d4eeeb;border-radius:7px;padding:7px 10px;}
    .field-label{font-size:11px;color:#2a9d8f;font-weight:bold;min-width:68px;white-space:nowrap;}
    .field-row input{flex:1;border:none;background:transparent;font-size:13px;font-family:inherit;outline:none;color:#333;min-width:0;}
    .field-row input::placeholder{color:#ccc;}
    .btn-remove{background:none;border:none;color:#ccc;cursor:pointer;font-size:15px;line-height:1;padding:0 2px;transition:color .2s;flex-shrink:0;}
    .btn-remove:hover{color:#e63946;}
    .btn-add{width:100%;padding:7px;border:2px dashed #b2dfdb;border-radius:7px;background:#fff;color:#2a9d8f;font-size:12px;font-family:inherit;cursor:pointer;transition:all .2s;}
    .btn-add:hover{background:#e0f5f3;border-color:#2a9d8f;}

    .slider-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
    .slider-row label{font-size:11px;color:#666;min-width:60px;white-space:nowrap;}
    .slider-row input[type=range]{flex:1;accent-color:#2a9d8f;}
    .slider-val{font-size:12px;color:#2a9d8f;font-weight:bold;min-width:36px;text-align:right;}

    .btn-group{display:flex;gap:6px;}
    .sel-btn{flex:1;padding:8px 4px;border:2px solid #ddd;border-radius:7px;background:#fff;cursor:pointer;font-size:11px;font-family:inherit;transition:all .2s;color:#555;text-align:center;}
    .sel-btn.on-teal{border-color:#2a9d8f;background:#e0f5f3;color:#2a9d8f;font-weight:bold;}
    .sel-btn.on-gray{border-color:#555;background:#eee;color:#333;font-weight:bold;}
    .f-mincho{font-family:"Hiragino Mincho ProN","Yu Mincho","MS Mincho",serif;}
    .f-gothic{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;}
    .f-maru{font-family:"M PLUS Rounded 1c","Hiragino Maru Gothic ProN",sans-serif;}

    .btn-dl{width:100%;padding:12px;border:none;border-radius:9px;font-size:13px;font-weight:bold;font-family:inherit;cursor:pointer;transition:all .2s;margin-top:8px;}
    .btn-color{background:#2a9d8f;color:#fff;}
    .btn-color:hover{background:#22877a;}
    .btn-bw{background:#444;color:#fff;}
    .btn-bw:hover{background:#222;}
    .btn-dl:disabled{opacity:.55;cursor:not-allowed;}
    .status{font-size:11px;color:#999;margin-top:8px;text-align:center;min-height:16px;}
    .status.ok{color:#2a9d8f;} .status.err{color:#e63946;}

    /* ===== プレビュー ===== */
    .right{flex:1;background:#fff;border-radius:10px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.07);}
    #prev-wrap{position:relative;display:inline-block;width:100%;}
    #prev-img{width:100%;height:auto;display:block;border-radius:3px;}
    #prev-img.bw{filter:grayscale(100%);}
    .overlay{position:absolute;left:4%;width:76%;display:flex;flex-direction:column;justify-content:center;padding:4px 14px;overflow:hidden;pointer-events:none;}
    .ov-line{line-height:1.45;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:bold;color:#222;}
    .ov-ph{color:#ccc;font-weight:normal;font-style:italic;}

    @media(max-width:760px){.wrap{flex-direction:column;padding:12px;}.left{width:100%;}}
  </style>
</head>
<body>
<header>
  <h1>ケアプランデータ連携システム　フライヤー作成ツール</h1>
  <p>デザインを選んで → 事業所情報を入力 → PDFダウンロード</p>
</header>

<!-- ===== デザイン選択バー ===== -->
<div class="design-bar">
  <h2>🖼️ デザインを選択してください</h2>
  <div class="design-cards" id="design-cards"></div>
  <div class="cors-warning" id="cors-warning">
    ⚠️ 画像の読み込みに制限があります。PDFダウンロードに失敗する場合は、ポスター画像をGitHubにアップロードしてください。
  </div>
</div>

<div class="wrap">
  <!-- ===== 左：フォーム ===== -->
  <div class="left">
    <div class="card">
      <div class="card-title">📝 テキスト入力</div>
      <div class="field-list" id="field-list">
        <div class="field-row">
          <span class="field-label">事業所番号</span>
          <input type="text" placeholder="例：1234567890" maxlength="30" oninput="render()">
          <button class="btn-remove" onclick="delRow(this)">✕</button>
        </div>
        <div class="field-row">
          <span class="field-label">事業所名</span>
          <input type="text" placeholder="例：〇〇介護センター" maxlength="30" oninput="render()">
          <button class="btn-remove" onclick="delRow(this)">✕</button>
        </div>
      </div>
      <button class="btn-add" onclick="addRow()">＋ 行を追加する</button>
    </div>

    <div class="card">
      <div class="card-title">🔤 文字設定</div>
      <div style="font-size:11px;color:#888;margin-bottom:6px;">フォント</div>
      <div class="btn-group">
        <button class="sel-btn f-gothic on-teal" id="f-gothic"  onclick="setFont('gothic')">ゴシック</button>
        <button class="sel-btn f-maru"           id="f-maru"    onclick="setFont('maru')">丸ゴシック</button>
        <button class="sel-btn f-mincho"          id="f-mincho"  onclick="setFont('mincho')">明朝体</button>
      </div>
      <div class="slider-row" style="margin-top:12px;">
        <label>文字サイズ</label>
        <input type="range" id="sl-size" min="10" max="80" value="30" oninput="render()">
        <span class="slider-val" id="lbl-size">30</span>
      </div>
      <div style="font-size:10px;color:#aaa;margin-top:2px;text-align:right;">文字色：
        <select id="txt-color" onchange="render()" style="font-size:11px;border:1px solid #ddd;border-radius:4px;padding:2px;">
          <option value="#222">黒</option>
          <option value="#fff">白</option>
          <option value="#2a9d8f">ティール</option>
        </select>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📐 位置調整</div>
      <div class="slider-row">
        <label>上下位置</label>
        <input type="range" id="sl-top" min="0" max="90" value="12" step="0.5" oninput="render()">
        <span class="slider-val" id="lbl-top">12.0%</span>
      </div>
      <div class="slider-row">
        <label>左右位置</label>
        <input type="range" id="sl-left" min="0" max="30" value="4" step="0.5" oninput="render()">
        <span class="slider-val" id="lbl-left">4.0%</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🎨 出力設定</div>
      <div style="font-size:11px;color:#888;margin-bottom:6px;">プレビューカラー</div>
      <div class="btn-group">
        <button class="sel-btn on-teal" id="c-color" onclick="setColor('color')">🟢 カラー</button>
        <button class="sel-btn"         id="c-bw"    onclick="setColor('bw')">⚫ 白黒</button>
      </div>
      <button class="btn-dl btn-color" onclick="dlPDF('color')" style="margin-top:14px;">📥 カラーPDFをダウンロード</button>
      <button class="btn-dl btn-bw"    onclick="dlPDF('bw')">📥 白黒PDFをダウンロード</button>
      <div class="status" id="status"></div>
    </div>
  </div>

  <!-- ===== 右：プレビュー ===== -->
  <div class="right">
    <div class="card-title">👁️ プレビュー</div>
    <div id="prev-wrap">
      <img id="prev-img" src="" alt="デザインを選択してください" style="background:#f0f0f0;min-height:200px;">
      <div class="overlay" id="overlay"></div>
    </div>
  </div>
</div>

<script>
var DESIGNS = [{"id": 1, "url": "https://www.careplan-renkei-support.jp/wp-content/themes/kkh-prod/assets/img/chara/download_poster_01.png", "name": "デザイン①"}, {"id": 2, "url": "https://www.careplan-renkei-support.jp/wp-content/themes/kkh-prod/assets/img/chara/download_poster_02.png", "name": "デザイン②"}, {"id": 3, "url": "https://www.careplan-renkei-support.jp/wp-content/themes/kkh-prod/assets/img/chara/download_poster_03.png", "name": "デザイン③"}, {"id": 4, "url": "https://www.careplan-renkei-support.jp/wp-content/themes/kkh-prod/assets/img/chara/download_poster_04.png", "name": "デザイン④"}, {"id": 5, "url": "https://www.careplan-renkei-support.jp/wp-content/themes/kkh-prod/assets/img/chara/download_poster_05.png", "name": "デザイン⑤"}];

var FONTS = {
  gothic: '"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif',
  maru:   '"M PLUS Rounded 1c","Hiragino Maru Gothic ProN",sans-serif',
  mincho: '"Hiragino Mincho ProN","Yu Mincho","MS Mincho",serif'
};

var curFont = 'gothic';
var curDesign = DESIGNS[0];
var curDesignIdx = 0;

// ===== デザインカード生成 =====
function buildDesignCards() {
  var container = document.getElementById('design-cards');
  DESIGNS.forEach(function(d, i) {
    var card = document.createElement('div');
    card.className = 'design-card' + (i===0 ? ' active' : '');
    card.onclick = function() { selectDesign(i); };
    var img = document.createElement('img');
    img.src = d.url;
    img.alt = d.name;
    img.onerror = function() { this.style.background='#eee'; this.alt='読み込みエラー'; };
    var label = document.createElement('div');
    label.className = 'dc-name';
    label.textContent = d.name;
    card.appendChild(img);
    card.appendChild(label);
    container.appendChild(card);
  });
}

function selectDesign(idx) {
  curDesignIdx = idx;
  curDesign = DESIGNS[idx];
  document.querySelectorAll('.design-card').forEach(function(c,i){
    c.classList.toggle('active', i===idx);
  });
  document.getElementById('prev-img').src = curDesign.url;
  render();
}

// ===== フォント =====
function setFont(name) {
  curFont = name;
  ['gothic','maru','mincho'].forEach(function(f){
    document.getElementById('f-'+f).classList.toggle('on-teal', f===name);
  });
  render();
}

// ===== カラー =====
function setColor(mode) {
  var img = document.getElementById('prev-img');
  document.getElementById('c-color').classList.toggle('on-teal', mode==='color');
  document.getElementById('c-bw').classList.toggle('on-gray', mode==='bw');
  img.classList.toggle('bw', mode==='bw');
}

// ===== 行追加・削除 =====
function addRow() {
  var list = document.getElementById('field-list');
  var d = document.createElement('div');
  d.className = 'field-row';
  d.innerHTML = '<span class="field-label">テキスト</span><input type="text" placeholder="入力してください" maxlength="30" oninput="render()"><button class="btn-remove" onclick="delRow(this)">✕</button>';
  list.appendChild(d);
  d.querySelector('input').focus();
  render();
}
function delRow(btn) { btn.closest('.field-row').remove(); render(); }
function getLines() {
  var lines = [];
  document.querySelectorAll('#field-list .field-row input').forEach(function(inp){
    if(inp.value.trim()) lines.push(inp.value.trim());
  });
  return lines;
}

// ===== プレビュー更新 =====
function render() {
  var lines = getLines();
  var sz   = parseInt(document.getElementById('sl-size').value);
  var topP = parseFloat(document.getElementById('sl-top').value);
  var leftP= parseFloat(document.getElementById('sl-left').value);
  var txtColor = document.getElementById('txt-color').value;
  document.getElementById('lbl-size').textContent = sz;
  document.getElementById('lbl-top').textContent  = topP.toFixed(1)+'%';
  document.getElementById('lbl-left').textContent = leftP.toFixed(1)+'%';
  var ov = document.getElementById('overlay');
  ov.style.top  = topP+'%';
  ov.style.left = leftP+'%';
  ov.style.width= (96-leftP)+'%';
  ov.innerHTML  = '';
  var fontFam = FONTS[curFont];
  var imgW = document.getElementById('prev-img').clientWidth || 500;
  var previewSz = sz * imgW / 3520;
  if(!lines.length){
    var ph=document.createElement('div'); ph.className='ov-line ov-ph';
    ph.style.fontSize=(previewSz*0.6)+'px';
    ph.textContent='事業所番号・事業所名などを入力してください';
    ov.appendChild(ph); return;
  }
  lines.forEach(function(txt){
    var el=document.createElement('div'); el.className='ov-line';
    el.style.fontFamily=fontFam; el.style.fontSize=previewSz+'px';
    el.style.color=txtColor; el.textContent=txt; ov.appendChild(el);
  });
}

// ===== ステータス =====
function setStatus(msg,type){ var el=document.getElementById('status'); el.textContent=msg; el.className='status'+(type?' '+type:''); }

// ===== 画像をDataURLに変換（CORS対応） =====
async function imgToDataURL(url) {
  return new Promise(function(resolve, reject) {
    var img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function() {
      var c = document.createElement('canvas');
      c.width = img.naturalWidth || 3520;
      c.height = img.naturalHeight || 4994;
      var ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0);
      try { resolve(c.toDataURL('image/jpeg', 0.92)); }
      catch(e) { reject(new Error('CORS')); }
    };
    img.onerror = function() { reject(new Error('load')); };
    img.src = url;
  });
}

// ===== PDF生成 =====
async function dlPDF(mode) {
  var lines = getLines();
  if(!lines.length) { setStatus('テキストを入力してください','err'); return; }
  if(!curDesign.url) { setStatus('デザインを選択してください','err'); return; }
  setStatus('PDF生成中...',''); 
  document.querySelectorAll('.btn-dl').forEach(function(b){b.disabled=true;});
  try {
    var sz    = parseInt(document.getElementById('sl-size').value);
    var topP  = parseFloat(document.getElementById('sl-top').value);
    var leftP = parseFloat(document.getElementById('sl-left').value);
    var txtColor = document.getElementById('txt-color').value;
    var fontFam = FONTS[curFont];

    // 画像をDataURLに変換
    var imgDataURL;
    try {
      imgDataURL = await imgToDataURL(curDesign.url);
    } catch(e) {
      document.getElementById('cors-warning').style.display='block';
      setStatus('❌ 画像の読み込みに失敗しました。画像をGitHubにアップロードしてください。','err');
      document.querySelectorAll('.btn-dl').forEach(function(b){b.disabled=false;});
      return;
    }

    // 画像のサイズ取得（3520x4994 を想定）
    var iw = 3520, ih = 4994;
    
    // キャンバスに描画
    var canvas = document.createElement('canvas');
    canvas.width = iw; canvas.height = ih;
    var ctx = canvas.getContext('2d');
    
    // 背景画像を描く
    var bgImg = new Image();
    bgImg.crossOrigin = 'anonymous';
    await new Promise(function(r){ bgImg.onload=r; bgImg.src=imgDataURL; });
    ctx.drawImage(bgImg, 0, 0);
    
    // 白黒変換
    if(mode==='bw') {
      var imgd = ctx.getImageData(0,0,iw,ih);
      var d=imgd.data;
      for(var i=0;i<d.length;i+=4){
        var g=Math.round(0.299*d[i]+0.587*d[i+1]+0.114*d[i+2]);
        d[i]=d[i+1]=d[i+2]=g;
      }
      ctx.putImageData(imgd,0,0);
    }
    
    // テキストを描く
    var textX = iw * leftP / 100;
    var textY = ih * topP / 100;
    ctx.font = 'bold ' + sz + 'px ' + fontFam;
    ctx.fillStyle = txtColor;
    ctx.textBaseline = 'top';
    var lineH = sz * 1.5;
    lines.forEach(function(txt, i) {
      ctx.fillText(txt, textX, textY + i * lineH);
    });

    // PDF出力
    var finalImg = canvas.toDataURL('image/jpeg', 0.92);
    var jsPDF2 = window.jspdf.jsPDF;
    var pdf = new jsPDF2({orientation:'portrait',unit:'mm',format:'a4'});
    pdf.addImage(finalImg,'JPEG',0,0,210,297);
    var modeLabel = mode==='bw' ? '白黒' : 'カラー';
    var first = lines[0].replace(/[\s\/\\:*?"<>|]/g,'_').slice(0,20);
    pdf.save(first+'_'+modeLabel+'.pdf');
    setStatus('✅ ダウンロード完了！','ok');
  } catch(e) {
    console.error(e);
    setStatus('❌ エラーが発生しました：'+e.message,'err');
  } finally {
    document.querySelectorAll('.btn-dl').forEach(function(b){b.disabled=false;});
  }
}

// ===== 初期化 =====
buildDesignCards();
document.getElementById('prev-img').src = DESIGNS[0].url;
render();
</script>
</body>
</html>
